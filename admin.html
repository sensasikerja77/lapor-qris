<script>
const SUPABASE_URL = 'https://gvstjlukrfyeztbnutdd.supabase.co';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

var currentNoteId = null;

var TOKO_MAP = {
  'Toko 1': 'WG77', 'Toko 2': 'SENSATIONAL77', 'Toko 3': 'CITRA77',
  'Toko 4': 'MAXWIN77', 'Toko 5': 'HOKIWIN77', 'Toko 6': 'MAXWIN25',
  'Toko 7': 'LUMBUNG138', 'Toko 8': 'SPONTAN77', 'Toko 9': 'ASIAHOKI77',
  'Toko 10': 'MULIA77', 'Toko 11': 'BOSWIN77', 'Toko 12': 'LAUTAN77',
  'Toko 13': 'SLOT25', 'Toko 14': 'WIN25'
};

function getTokoName(tokoValue) { return TOKO_MAP[tokoValue] || tokoValue; }

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

// Format tanggal YYYY-MM-DD ke DD/MM/YYYY
function formatTanggal(tanggalDB) {
  if (!tanggalDB) return '';
  if (tanggalDB.includes('/')) return tanggalDB;
  var parts = tanggalDB.split('-');
  if (parts.length === 3) {
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return tanggalDB;
}

// Format nominal dengan titik ribuan
function formatNominal(nominal) {
  if (!nominal) return '-';
  var num = String(nominal).replace(/[^\d]/g, '');
  if (!num) return '-';
  return num.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

async function login() {
  var email = document.getElementById('u').value.trim();
  var password = document.getElementById('p').value;
  var err = document.getElementById('err');
  err.textContent = '⏳ Memproses...';
  
  if (!email || !password) {
    err.textContent = '❌ Email dan password harus diisi!';
    return;
  }

  const { error } = await db.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    err.textContent = '❌ Login gagal: ' + error.message;
  } else {
    err.textContent = '';
    showDashboard();
  }
}

async function logout() {
  await db.auth.signOut();
  location.reload();
}

async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showDashboard();
}
checkSession();

document.getElementById('p').onkeypress = function(e) {
  if (e.key === 'Enter') login();
};

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadReports();
}

async function supabaseQuery(endpoint, options) {
  var url = SUPABASE_URL + '/rest/v1/' + endpoint;
  const { data: { session } } = await db.auth.getSession();
  const authToken = session ? session.access_token : SUPABASE_KEY;

  var defaultOptions = {
    method: 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + authToken,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  var finalOptions = Object.assign({}, defaultOptions, options);
  if (options && options.headers) {
    finalOptions.headers = Object.assign({}, defaultOptions.headers, options.headers);
  }
  var response = await fetch(url, finalOptions);
  if (!response.ok) {
    var errorText = await response.text();
    throw new Error('HTTP ' + response.status + ': ' + errorText);
  }
  var text = await response.text();
  return text ? JSON.parse(text) : null;
}

function extractFilename(fotoUrl) {
  if (!fotoUrl) return null;
  var parts = fotoUrl.split('/');
  return parts[parts.length - 1];
}

async function deleteFoto(fotoUrl) {
  if (!fotoUrl) return true;
  var filename = extractFilename(fotoUrl);
  if (!filename) return false;
  try {
    const { data: { session } } = await db.auth.getSession();
    var url = SUPABASE_URL + '/storage/v1/object/bukti-qris/' + filename;
    var response = await fetch(url, {
      method: 'DELETE',
      headers: { 
        'apikey': SUPABASE_KEY, 
        'Authorization': 'Bearer ' + (session ? session.access_token : SUPABASE_KEY) 
      }
    });
    return response.ok || response.status === 404;
  } catch (e) {
    console.error('Delete foto error:', e);
    return false;
  }
}

async function loadReports() {
  var status = document.getElementById('filter-status').value;
  var toko = document.getElementById('filter-toko').value;
  var search = document.getElementById('filter-search').value.toLowerCase();
  
  var query = 'laporan?select=*&order=created_at.desc';
  if (status) query += '&status=eq.' + status;
  if (toko) query += '&toko=eq.' + encodeURIComponent(toko);
  
  try {
    var data = await supabaseQuery(query);
    var filtered = data || [];
    updateStats(data || []);
    
    if (search) {
      filtered = filtered.filter(function(d) {
        var tokoName = getTokoName(d.toko) || '';
        return (d.user_id || '').toLowerCase().includes(search) ||
               (d.nama_merchant || '').toLowerCase().includes(search) ||
               (d.rrn_qris || '').toLowerCase().includes(search) ||
               tokoName.toLowerCase().includes(search);
      });
    }
    
    document.getElementById('report-count').textContent = filtered.length + ' laporan';
    
    if (filtered.length === 0) {
      document.getElementById('report-list').innerHTML = '<p style="text-align:center;padding:40px;color:#64748b">📭 Tidak ada laporan</p>';
      return;
    }
    
    document.getElementById('report-list').innerHTML = filtered.map(renderReport).join('');
  } catch (e) {
    document.getElementById('report-list').innerHTML = '<p style="color:red;padding:20px">❌ Error: ' + escapeHtml(e.message) + '</p>';
  }
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-pending').textContent = data.filter(function(d) { return d.status === 'pending'; }).length;
  document.getElementById('stat-progress').textContent = data.filter(function(d) { return d.status === 'on_progress'; }).length;
  document.getElementById('stat-waiting').textContent = data.filter(function(d) { return d.status === 'menunggu_h1'; }).length;
  document.getElementById('stat-success').textContent = data.filter(function(d) { return d.status === 'sukses'; }).length;
}

// ✅ COPY DATA + NOMINAL
async function copyData(id) {
  try {
    var data = await supabaseQuery('laporan?id=eq.' + id);
    if (!data || !data[0]) {
      alert('❌ Data tidak ditemukan');
      return;
    }
    
    var laporan = data[0];
    var tanggalFormatted = formatTanggal(laporan.tanggal_transfer);
    var nominalFormatted = formatNominal(laporan.nominal);
    
    var textToCopy = 
      'Tanggal, dan Jam: ' + tanggalFormatted + ' ' + laporan.jam_transfer + '\n' +
      'Nama Merchant: ' + laporan.nama_merchant + '\n' +
      'User ID Player: ' + laporan.user_id + '\n' +
      'RRN QRIS: ' + laporan.rrn_qris + '\n' +
      'Nominal: ' + nominalFormatted;
    
    await navigator.clipboard.writeText(textToCopy);
    showToast('✅ Data berhasil di-copy!');
    
  } catch (e) {
    alert('❌ Gagal copy: ' + e.message);
  }
}

// ✅ EDIT DATA
async function openEdit(id) {
  try {
    var data = await supabaseQuery('laporan?id=eq.' + id);
    if (!data || !data[0]) {
      alert('❌ Data tidak ditemukan');
      return;
    }
    
    var laporan = data[0];
    
    document.getElementById('edit-id').value = laporan.id;
    document.getElementById('edit-nama-merchant').value = laporan.nama_merchant || '';
    document.getElementById('edit-user-id').value = laporan.user_id || '';
    document.getElementById('edit-toko').value = laporan.toko || 'Toko 1';
    document.getElementById('edit-rrn').value = laporan.rrn_qris || '';
    document.getElementById('edit-jenis-qris').value = laporan.jenis_qris || 'QRIS HOKI';
    document.getElementById('edit-tanggal').value = laporan.tanggal_transfer || '';
    document.getElementById('edit-jam').value = laporan.jam_transfer || '';
    document.getElementById('edit-nominal').value = laporan.nominal || '';
    document.getElementById('edit-catatan').value = laporan.catatan_admin || '';
    
    document.getElementById('modal-edit').classList.add('active');
    
  } catch (e) {
    alert('❌ Error: ' + e.message);
  }
}

async function saveEdit() {
  var id = document.getElementById('edit-id').value;
  if (!id) {
    alert('❌ ID laporan tidak ditemukan');
    return;
  }
  
  var tanggalInput = document.getElementById('edit-tanggal').value;
  var tanggalFormatted = tanggalInput;
  if (tanggalInput && !tanggalInput.includes('/')) {
    var parts = tanggalInput.split('-');
    if (parts.length === 3) {
      tanggalFormatted = parts[2] + '/' + parts[1] + '/' + parts[0];
    }
  }
  
  try {
    await supabaseQuery('laporan?id=eq.' + id, {
      method: 'PATCH',
      body: JSON.stringify({
        nama_merchant: document.getElementById('edit-nama-merchant').value.trim(),
        user_id: document.getElementById('edit-user-id').value.trim().toLowerCase(),
        toko: document.getElementById('edit-toko').value,
        rrn_qris: document.getElementById('edit-rrn').value.trim(),
        jenis_qris: document.getElementById('edit-jenis-qris').value,
        tanggal_transfer: tanggalFormatted,
        jam_transfer: document.getElementById('edit-jam').value,
        nominal: document.getElementById('edit-nominal').value.trim(),
        catatan_admin: document.getElementById('edit-catatan').value.trim(),
        updated_at: new Date().toISOString()
      })
    });
    
    closeModal('modal-edit');
    showToast('✅ Data berhasil diupdate!');
    loadReports();
    
  } catch (e) {
    alert('❌ Error: ' + e.message);
  }
}

function showToast(message) {
  var toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(function() {
    toast.classList.remove('show');
  }, 2000);
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
}

function renderReport(r) {
  var statusMap = {
    'pending': { label: 'PENDING', class: 'badge-pending' },
    'on_progress': { label: 'ON PROGRESS', class: 'badge-progress' },
    'menunggu_h1': { label: 'MENUNGGU H+1', class: 'badge-waiting' },
    'sukses': { label: 'SELESAI', class: 'badge-success' }
  };
  var s = statusMap[r.status] || statusMap['pending'];
  
  var tanggalFormatted = formatTanggal(r.tanggal_transfer);
  var nominalFormatted = formatNominal(r.nominal);
  
  var catatanHtml = r.catatan_admin ? 
    '<div style="grid-column:1/-1"><strong>Catatan Admin</strong>' + escapeHtml(r.catatan_admin) + '</div>' : '';
  
  var fotoHtml = '';
  if (r.foto_bukti) {
    fotoHtml = '<a href="' + escapeHtml(r.foto_bukti) + '" target="_blank"><img src="' + escapeHtml(r.foto_bukti) + '" class="foto-thumb" alt="Bukti"></a>';
  } else {
    fotoHtml = '<div class="foto-deleted">🗑️ Foto telah dihapus (transaksi selesai)</div>';
  }
  
  var actions = '';
  if (r.status !== 'on_progress') actions += '<button class="btn-progress" onclick="updateStatus(\'' + r.id + '\',\'on_progress\')">▶️ Progress</button>';
  if (r.status !== 'menunggu_h1') actions += '<button class="btn-waiting" onclick="updateStatus(\'' + r.id + '\',\'menunggu_h1\')">⏰ H+1</button>';
  if (r.status !== 'sukses') actions += '<button class="btn-success" onclick="updateStatus(\'' + r.id + '\',\'sukses\')">✅ Sukses</button>';
  actions += '<button class="btn-copy" onclick="copyData(\'' + r.id + '\')">📋 Copy</button>';
  actions += '<button class="btn-edit" onclick="openEdit(\'' + r.id + '\')">✏️ Edit</button>';
  actions += '<button class="btn-note" onclick="openNote(\'' + r.id + '\')">📝 Catatan</button>';
  actions += '<button class="btn-delete" onclick="deleteReport(\'' + r.id + '\')">🗑️ Hapus</button>';
  
  return '<div class="report-item">' +
    '<div class="report-head">' +
      '<div style="flex:1;min-width:0">' +
        '<h3>' + escapeHtml(getTokoName(r.toko)) + ' - ' + escapeHtml(r.nama_merchant) + '</h3>' +
        '<small>User ID: <strong>' + escapeHtml(r.user_id) + '</strong> | ' + new Date(r.created_at).toLocaleString('id-ID') + '</small>' +
      '</div>' +
      '<span class="status-badge ' + s.class + '">' + s.label + '</span>' +
    '</div>' +
    '<div class="report-detail">' +
      '<div><strong>RRN QRIS</strong>' + escapeHtml(r.rrn_qris) + '</div>' +
      '<div><strong>Jenis QRIS</strong>' + escapeHtml(r.jenis_qris) + '</div>' +
      '<div><strong>Nominal</strong>' + escapeHtml(nominalFormatted) + '</div>' +
      '<div><strong>Tanggal Transfer</strong>' + escapeHtml(tanggalFormatted) + ' ' + escapeHtml(r.jam_transfer) + '</div>' +
      catatanHtml +
    '</div>' +
    fotoHtml +
    '<div class="report-actions">' + actions + '</div>' +
  '</div>';
}

async function updateStatus(id, status) {
  var confirmMsg = 'Ubah status menjadi ' + status + '?';
  if (status === 'sukses') {
    confirmMsg += '\n\n⚠️ PERHATIAN:\nFoto bukti akan dihapus otomatis untuk menghemat storage.\nData laporan tetap tersimpan untuk histori.\n\nLanjutkan?';
  }
  if (!confirm(confirmMsg)) return;
  try {
    if (status === 'sukses') {
      var data = await supabaseQuery('laporan?id=eq.' + id + '&select=foto_bukti');
      if (data && data[0] && data[0].foto_bukti) await deleteFoto(data[0].foto_bukti);
      await supabaseQuery('laporan?id=eq.' + id, {
        method: 'PATCH',
        body: JSON.stringify({ status: status, foto_bukti: null, updated_at: new Date().toISOString() })
      });
    } else {
      await supabaseQuery('laporan?id=eq.' + id, {
        method: 'PATCH',
        body: JSON.stringify({ status: status, updated_at: new Date().toISOString() })
      });
    }
    loadReports();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function openNote(id) {
  currentNoteId = id;
  try {
    var data = await supabaseQuery('laporan?id=eq.' + id + '&select=catatan_admin');
    var note = (data && data[0] && data[0].catatan_admin) || '';
    document.getElementById('note-text').value = note;
    document.getElementById('modal-note').classList.add('active');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function saveNote() {
  var note = document.getElementById('note-text').value;
  if (!currentNoteId) {
    alert('Error: ID laporan tidak ditemukan');
    return;
  }
  try {
    await supabaseQuery('laporan?id=eq.' + currentNoteId, {
      method: 'PATCH',
      body: JSON.stringify({ catatan_admin: note, updated_at: new Date().toISOString() })
    });
    closeModal('modal-note');
    showToast('✅ Catatan berhasil disimpan!');
    loadReports();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteReport(id) {
  if (!confirm('Yakin hapus laporan ini?\nFoto dan semua data akan dihapus PERMANEN!')) return;
  try {
    var data = await supabaseQuery('laporan?id=eq.' + id + '&select=foto_bukti');
    if (data && data[0] && data[0].foto_bukti) await deleteFoto(data[0].foto_bukti);
    await supabaseQuery('laporan?id=eq.' + id, { method: 'DELETE' });
    loadReports();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
</script>
